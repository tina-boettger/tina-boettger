name: Build Release Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check site
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Package dist folder
        if: github.event_name != 'pull_request'
        run: |
          cd dist
          zip -r ../site-dist.zip .

      - name: Upload release package
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: site-dist.zip
          if-no-files-found: error

